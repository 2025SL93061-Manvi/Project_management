# ─────────────────────────────────────────────
# SERVER
# ─────────────────────────────────────────────
server.port=8080

# ─────────────────────────────────────────────
# MYSQL DATABASE
# Change username/password to match your local MySQL
# ─────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─────────────────────────────────────────────
# JPA / HIBERNATE
# update  = creates/alters tables automatically on startup
# ─────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─────────────────────────────────────────────
# JWT
# Secret must be at least 64 characters for HS512
# Expiry = 24 hours (in milliseconds)
# ─────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# ─────────────────────────────────────────────
# FILE UPLOAD (Online Storage)
# Files are saved in this folder on the server
# Max single file = 10 MB, max request = 50 MB
# ─────────────────────────────────────────────
file.upload-dir=./uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ─────────────────────────────────────────────
# EMAIL (Resend)
# Set RESEND_API_KEY and RESEND_FROM in your .env file
# RESEND_FROM must be a verified sender, e.g. noreply@yourdomain.com
# ─────────────────────────────────────────────
resend.api-key=${RESEND_API_KEY}
resend.from=${RESEND_FROM}

# ─────────────────────────────────────────────
# APP NAME (used in email subjects)
# ─────────────────────────────────────────────
app.name=Enterprise Project Manager

# ─────────────────────────────────────────────
# JACKSON
# Serialize/deserialize LocalDate as ISO strings (e.g. "2026-06-15")
# instead of timestamp arrays, matching what the frontend sends
# ─────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
